        .bg-macaron-green { background-color: #C8E6C9; }

        .hover-macaron-blue:hover { background-color: #80DEEA; }
        
        .text-macaron-dark { color: #5D4037; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #FFC4C4;
            border-radius: 5px;
        }

        /* Option Selection Styles */
        .option-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .option-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .option-card.selected {
            background-color: #B2EBF2; /* Macaron Blue */
            border-color: #00BCD4;
            font-weight: bold;
        }

        /* Print Styles */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break { page-break-before: always; }
            #result-screen { display: block !important; }
            #quiz-screen, #home-screen { display: none !important; }
        }
        .print-only { display: none; }

                </div>

                        <label class="block text-gray-600 mb-2">題目數量</label>
                        <div class="flex gap-3 flex-wrap">

        let allQuestions = [];
        
        // App State
        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {}; // { qId: optionIndex }
        let timerInterval;
        let elapsedSeconds = 0;
        let userInfo = { id: '', name: '' };
        let quizSettings = { count: 50, start: 1, end: 250 };

        // DOM Elements
        const screens = {
            home: document.getElementById('home-screen'),
            quiz: document.getElementById('quiz-screen'),
            result: document.getElementById('result-screen')
        };
        const timerDisplay = document.getElementById('timer-display');
        const timeValue = document.getElementById('time-value');

        // Initialization
        window.onload = () => {
            parseCSVData();
            setupEventListeners();
        };

        function parseCSVData() {
            // Regex to match: "Answer","Number","Question"
            // Handles cases where Answer is "4" or "(4)"
            const regex = /"\(?(\d+)\)?","(\d+)","(.*?)"/g;
            
            let match;
            allQuestions = [];

            while ((match = regex.exec(RAW_DATA)) !== null) {
                const answer = parseInt(match[1]);
                const id = parseInt(match[2]);
                const fullText = match[3];
                
                // Parse options from question text (looking for (1), (2), etc.)
                // Pattern matches (1) text (2) text ...
                const optionParts = fullText.split(/\(\d\)/);
                
                if(optionParts.length > 1) {
                    const questionBody = optionParts[0].trim();
                    const options = optionParts.slice(1).map(opt => opt.trim());
                    
                    // Basic validation to ensure we have options
                    if (options.length === 4) {
                        allQuestions.push({
                            id: id,
                            answer: answer,
                            question: questionBody,
                            options: options
                        });
                    }
                }
            }
            
            // Update UI with loaded count
            const count = allQuestions.length;
            document.getElementById('max-q-label').innerText = count;
            document.getElementById('max-q-label-2').innerText = count;
            document.getElementById('end-range').value = count;
            
            // Show status
            const statusEl = document.getElementById('loading-status');
            const totalQEl = document.getElementById('total-q-loaded');
            if (count > 0) {
                totalQEl.innerText = count;
                statusEl.classList.remove('hidden');
            } else {
                statusEl.innerText = "題目載入失敗，請檢查資料格式。";
                statusEl.classList.remove('text-green-600', 'hidden');
                statusEl.classList.add('text-red-600');
            }
        }

        function setupEventListeners() {
            // Question count buttons
            document.querySelectorAll('.q-count-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Reset styling
                    document.querySelectorAll('.q-count-btn').forEach(b => {
                        b.classList.remove('bg-macaron-green', 'text-white', 'shadow-md');
                        b.classList.add('text-gray-600');
                    });
                    // Apply to clicked
                    e.target.classList.add('bg-macaron-green', 'text-white', 'shadow-md');
                    e.target.classList.remove('text-gray-600');
                    quizSettings.count = parseInt(e.target.dataset.count);
                });
            });

            // Select All Range
            document.getElementById('select-all-btn').addEventListener('click', () => {
                document.getElementById('start-range').value = 1;
                document.getElementById('end-range').value = allQuestions.length;
            });

            // Start Quiz
            document.getElementById('setup-form').addEventListener('submit', (e) => {
                e.preventDefault();
                startQuiz();
            });

            // Navigation
            document.getElementById('prev-btn').addEventListener('click', () => navigate(-1));
            document.getElementById('next-btn').addEventListener('click', () => navigate(1));
            document.getElementById('submit-btn').addEventListener('click', finishQuiz);
        }

        function startQuiz() {
            // Validate inputs
            const sId = document.getElementById('student-id').value.trim();
            const sName = document.getElementById('student-name').value.trim();
            const startR = parseInt(document.getElementById('start-range').value);
            const endR = parseInt(document.getElementById('end-range').value);

            if (!sId || !sName) {
                alert('請輸入學號和姓名');
                return;
            }
            if (startR < 1 || endR > allQuestions.length || startR > endR) {
                alert(`請輸入有效的題號範圍 (1-${allQuestions.length})`);
                return;
            }

            userInfo = { id: sId, name: sName };
            quizSettings.start = startR;
            quizSettings.end = endR;

            // Filter and Randomize
            const pool = allQuestions.filter(q => q.id >= startR && q.id <= endR);
            if (pool.length === 0) {
                alert('此範圍內無題目');
                return;
            }
            
            // Shuffle pool
            pool.sort(() => Math.random() - 0.5);
            
            // Select N questions
            selectedQuestions = pool.slice(0, Math.min(quizSettings.count, pool.length));
            
            // Reset state
            currentQuestionIndex = 0;
            userAnswers = {};
            elapsedSeconds = 0;
            
            // UI Switch
            screens.home.classList.add('hidden');
            screens.quiz.classList.remove('hidden');
            screens.quiz.classList.add('flex');
            timerDisplay.classList.remove('hidden');
            
            // Start Timer
            startTimer();
            
            // Render first question
            renderQuestion();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                const mins = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
                const secs = (elapsedSeconds % 60).toString().padStart(2, '0');
                timeValue.innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function renderQuestion() {
            const q = selectedQuestions[currentQuestionIndex];
            
            // Update Header
            document.getElementById('q-current-num').innerText = currentQuestionIndex + 1;
            document.getElementById('q-total-num').innerText = selectedQuestions.length;
            document.getElementById('real-q-id').innerText = q.id;
            
            // Progress Bar
            const progress = ((currentQuestionIndex + 1) / selectedQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            // Content
            document.getElementById('question-text').innerText = q.question;
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            q.options.forEach((optText, idx) => {
                const optIdx = idx + 1;
                const btn = document.createElement('div');
                btn.className = `option-card w-full p-4 rounded-xl border-2 flex items-center space-x-3 bg-gray-50 hover:bg-macaron-blue hover:border-macaron-blue transition-colors text-lg`;
                
                // Check if previously selected
                if (userAnswers[q.id] === optIdx) {
                    btn.classList.add('selected');
                }

                btn.innerHTML = `
                    <div class="w-8 h-8 flex-shrink-0 rounded-full border-2 border-gray-400 flex items-center justify-center font-bold text-gray-500 bg-white option-circle">
                        ${optIdx}
                    </div>
                    <span class="text-left">${optText}</span>
                `;
                
                btn.addEventListener('click', () => selectOption(q.id, optIdx));
                optionsContainer.appendChild(btn);
            });

            // Button Logic
            document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
            
            const isLast = currentQuestionIndex === selectedQuestions.length - 1;
            const nextBtn = document.getElementById('next-btn');
            const submitBtn = document.getElementById('submit-btn');
            
            if (isLast) {
                nextBtn.classList.add('hidden');
                submitBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                submitBtn.classList.add('hidden');
            }
        }

        function selectOption(qId, optIdx) {
            userAnswers[qId] = optIdx;
            // Re-render to show selection
            const cards = document.querySelectorAll('.option-card');
            cards.forEach((card, idx) => {
                if (idx + 1 === optIdx) {
                    card.classList.add('selected');
                    card.querySelector('.option-circle').classList.add('bg-macaron-blue', 'text-white', 'border-transparent');
                } else {
                    card.classList.remove('selected');
                    const circle = card.querySelector('.option-circle');
                    circle.classList.remove('bg-macaron-blue', 'text-white', 'border-transparent');
                }
            });
        }

        function navigate(dir) {
            currentQuestionIndex += dir;
            renderQuestion();
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            
            // Calculate Score
            let correctCount = 0;
            selectedQuestions.forEach(q => {
                if (userAnswers[q.id] === q.answer) {
                    correctCount++;
                }
            });
            const score = Math.round((correctCount / selectedQuestions.length) * 100);

            // Render Results
            screens.quiz.classList.add('hidden');
            screens.quiz.classList.remove('flex');
            screens.result.classList.remove('hidden');
            timerDisplay.classList.add('hidden');

            document.getElementById('res-student-id').innerText = userInfo.id;
            document.getElementById('res-student-name').innerText = userInfo.name;
            document.getElementById('res-score').innerText = score;
            document.getElementById('res-time').innerText = timeValue.innerText;

            // Generate Detailed Review
            const reviewContainer = document.getElementById('review-container');
            reviewContainer.innerHTML = '';

            selectedQuestions.forEach((q, idx) => {
                const userAns = userAnswers[q.id];
                const isCorrect = userAns === q.answer;
                const statusColor = isCorrect ? 'text-green-600' : 'text-red-500';
                const statusIcon = isCorrect ? 'fa-check' : 'fa-times';
                
                const item = document.createElement('div');
                item.className = 'border-b border-gray-200 pb-4 no-break';
                
                let optionsHtml = '';
                q.options.forEach((opt, oIdx) => {
                    const oNum = oIdx + 1;
                    let colorClass = 'text-gray-600';
                    let icon = '';
                    
                    if (oNum === q.answer) {
                        colorClass = 'text-green-600 font-bold'; // Correct answer
                        icon = '<i class="fas fa-check ml-2"></i>';
                    }
                    if (oNum === userAns && !isCorrect) {
                        colorClass = 'text-red-500 line-through'; // Wrong user answer
                    }
                    if (oNum === userAns && isCorrect) {
                        colorClass = 'text-green-600 font-bold bg-green-50 rounded px-2';
                    }

                    optionsHtml += `<div class="${colorClass} ml-4 p-1">(${oNum}) ${opt} ${icon}</div>`;
                });

                item.innerHTML = `
                    <div class="flex gap-2 mb-2">
                        <span class="font-bold text-gray-400 w-8">${idx + 1}.</span>
                        <div class="flex-1">
                            <p class="font-bold text-lg mb-2 text-gray-800">
                                ${q.question} 
                                <span class="${statusColor} ml-2 text-sm"><i class="fas ${statusIcon}"></i></span>
                            </p>
                            <div class="space-y-1">
                                ${optionsHtml}
                            </div>
                            <div class="mt-2 text-sm text-gray-500">
                                您的答案: <span class="${isCorrect ? 'text-green-600' : 'text-red-500'} font-bold">${userAns || '未作答'}</span> | 
                                正確答案: <span class="text-green-600 font-bold">${q.answer}</span>
                            </div>
                        </div>
                    </div>
                `;
                reviewContainer.appendChild(item);
            });
        }

        // --- Export Functions ---

        function downloadResultsPDF() {
            // Trigger browser print dialog which has "Save as PDF"
            window.print();
        }

        function downloadCSV() {
            const bom = "\uFEFF"; // Byte Order Mark for UTF-8 in Excel
            let csvContent = `data:text/csv;charset=utf-8,${bom}`;
            
            // Header
            csvContent += `學號,${userInfo.id}\n`;
            csvContent += `姓名,${userInfo.name}\n`;
            csvContent += `測驗日期,${new Date().toLocaleString()}\n`;
            csvContent += `得分,${document.getElementById('res-score').innerText}\n`;
            csvContent += `耗時,${document.getElementById('res-time').innerText}\n\n`;
            
            // Details
            csvContent += `題號,題目,選項1,選項2,選項3,選項4,正確答案,您的答案,結果\n`;
            
            selectedQuestions.forEach(q => {
                const userAns = userAnswers[q.id] || 0;
                const isCorrect = userAns === q.answer ? '正確' : '錯誤';
                
                // Escape commas in text
                const safeText = (txt) => `"${txt.replace(/"/g, '""')}"`;
                
                const row = [
                    q.id,
                    safeText(q.question),
                    safeText(q.options[0]),
                    safeText(q.options[1]),
                    safeText(q.options[2]),
                    safeText(q.options[3]),
                    q.answer,
                    userAns,
                    isCorrect
                ];
                csvContent += row.join(",") + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `測驗結果_${userInfo.name}_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
